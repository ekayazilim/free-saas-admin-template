<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Heatmap Charts - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Heatmap Charts</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Heatmap</span></div></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Activity Heatmap</h6></div><div class="eka-card-body"><div id="heatmapChart" style="height:350px"></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="charts/heatmap.html";</script><script src="../assets/js/eka-app.js"></script><script src="https://cdn.jsdelivr.net/npm/apexcharts"></script><script>document.addEventListener("DOMContentLoaded",function(){function genData(count){var d=[];for(var i=0;i<count;i++){d.push(Math.floor(Math.random()*90)+10)}return d}new ApexCharts(document.querySelector("#heatmapChart"),{chart:{type:"heatmap",height:350,toolbar:{show:false}},series:[{name:"Mon",data:genData(24)},{name:"Tue",data:genData(24)},{name:"Wed",data:genData(24)},{name:"Thu",data:genData(24)},{name:"Fri",data:genData(24)},{name:"Sat",data:genData(24)},{name:"Sun",data:genData(24)}],colors:["#405189"],plotOptions:{heatmap:{radius:4,enableShades:true,shadeIntensity:0.5}},dataLabels:{enabled:false},xaxis:{categories:["12am","1am","2am","3am","4am","5am","6am","7am","8am","9am","10am","11am","12pm","1pm","2pm","3pm","4pm","5pm","6pm","7pm","8pm","9pm","10pm","11pm"]}}).render()});</script></body></html>
