<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Pie & Donut Charts - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Pie & Donut Charts</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Pie</span></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Pie Chart</h6></div><div class="eka-card-body"><div id="pieChart" style="height:300px"></div></div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Donut Chart</h6></div><div class="eka-card-body"><div id="donutChart" style="height:300px"></div></div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="charts/pie.html";</script><script src="../assets/js/eka-app.js"></script><script src="https://cdn.jsdelivr.net/npm/apexcharts"></script><script>document.addEventListener("DOMContentLoaded",function(){new ApexCharts(document.querySelector("#pieChart"),{chart:{type:"pie",height:300},series:[44,55,13,43,22],labels:["Electronics","Software","Services","Marketing","Other"],colors:["#405189","#0AB39C","#F7B84B","#F06548","#299CDB"],legend:{position:"bottom"},stroke:{width:0},dataLabels:{enabled:true}}).render();new ApexCharts(document.querySelector("#donutChart"),{chart:{type:"donut",height:300},series:[40,30,20,10],labels:["Desktop","Mobile","Tablet","Other"],colors:["#405189","#0AB39C","#F7B84B","#299CDB"],plotOptions:{pie:{donut:{size:"65%"}}},legend:{position:"bottom"},stroke:{width:0},dataLabels:{enabled:false}}).render()});</script></body></html>
