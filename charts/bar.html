<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Bar Charts - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Bar Charts</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Bar</span></div></div></div>

<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Stacked Bar</h6></div><div class="eka-card-body"><div id="stackedBar" style="height:300px"></div></div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="charts/bar.html";</script><script src="../assets/js/eka-app.js"></script><script src="https://cdn.jsdelivr.net/npm/apexcharts"></script><script>document.addEventListener("DOMContentLoaded",function(){new ApexCharts(document.querySelector("#basicBar"),{chart:{type:"bar",height:300,toolbar:{show:false}},series:[{name:"Sales",data:[44,55,41,67,22,43,21,45,55,30,40,50]}],colors:["#405189"],plotOptions:{bar:{borderRadius:4,columnWidth:"50%"}},xaxis:{categories:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]},dataLabels:{enabled:false}}).render();new ApexCharts(document.querySelector("#stackedBar"),{chart:{type:"bar",height:300,stacked:true,toolbar:{show:false}},series:[{name:"Product A",data:[44,55,41,37,22,43,21]},{name:"Product B",data:[13,23,20,8,13,27,33]},{name:"Product C",data:[11,17,15,15,21,14,15]}],colors:["#405189","#0AB39C","#F7B84B"],plotOptions:{bar:{borderRadius:4,columnWidth:"50%"}},xaxis:{categories:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]},dataLabels:{enabled:false},legend:{position:"top"}}).render()});</script></body></html>
