<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Scatter Charts - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Scatter Charts</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Scatter</span></div></div></div><div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Basic Scatter</h6></div><div class="eka-card-body"><div id="scatter1" style="height:300px"></div></div></div></div><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Multi-Group Scatter</h6></div><div class="eka-card-body"><div id="scatter2" style="height:300px"></div></div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="charts/scatter.html";</script><script src="../assets/js/eka-app.js"></script><script src="https://cdn.jsdelivr.net/npm/apexcharts"></script><script>document.addEventListener("DOMContentLoaded",function(){function genPairs(n){var d=[];for(var i=0;i<n;i++)d.push([Math.floor(Math.random()*80)+10,Math.floor(Math.random()*80)+10]);return d}new ApexCharts(document.querySelector("#scatter1"),{chart:{type:"scatter",height:300,toolbar:{show:false}},series:[{name:"Revenue vs Users",data:genPairs(20)}],colors:["#405189"],xaxis:{tickAmount:8},yaxis:{tickAmount:6},dataLabels:{enabled:false}}).render();new ApexCharts(document.querySelector("#scatter2"),{chart:{type:"scatter",height:300,toolbar:{show:false}},series:[{name:"Team A",data:genPairs(15)},{name:"Team B",data:genPairs(15)},{name:"Team C",data:genPairs(15)}],colors:["#405189","#0AB39C","#F06548"],xaxis:{tickAmount:8},yaxis:{tickAmount:6},dataLabels:{enabled:false}}).render()});</script></body></html>
