<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8"><link rel="icon" type="image/x-icon" href="../favicon.ico"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EkaAdmin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/eka-variables.css">
    <link rel="stylesheet" href="../assets/css/eka-base.css">
    <link rel="stylesheet" href="../assets/css/eka-components.css">
    <link rel="stylesheet" href="../assets/css/eka-forms.css">
    <link rel="stylesheet" href="../assets/css/eka-auth.css">
    <link rel="stylesheet" href="../assets/css/eka-animations.css">
    <link rel="stylesheet" href="../assets/css/eka-dark.css">
    <link rel="stylesheet" href="../assets/css/eka-responsive.css">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
</head>
<body>
    <div class="eka-auth-page">
        <div class="eka-auth-left">
            <div class="eka-auth-left-content eka-animate-fade-in">
                <div class="eka-auth-illustration">
                    <lord-icon src="https://cdn.lordicon.com/tdrtiskw.json" trigger="loop" delay="1500" colors="primary:#ffffff,secondary:#3577f1" style="width:200px;height:200px"></lord-icon>
                </div>
                <h2>Set New Password</h2>
                <p>Choose a strong password with at least 8 characters, including uppercase, lowercase, numbers, and symbols.</p>
            </div>
        </div>
        <div class="eka-auth-right">
            <div class="eka-auth-form-wrapper eka-animate-fade-in-up">
                <div class="eka-auth-logo"><div class="eka-logo-icon">EA</div><span>EkaAdmin</span></div>
                <h4>Create New Password</h4>
                <p class="eka-auth-subtitle">Your new password must be different from previously used passwords.</p>
                <form class="eka-auth-form">
                    <div class="eka-form-group"><label class="eka-form-label">New Password</label><div class="eka-password-toggle"><input type="password" class="eka-form-control" placeholder="Enter new password"><span class="eka-password-toggle-btn"><i class="fas fa-eye"></i></span></div></div>
                    <div class="eka-form-group"><label class="eka-form-label">Confirm Password</label><div class="eka-password-toggle"><input type="password" class="eka-form-control" placeholder="Confirm new password"><span class="eka-password-toggle-btn"><i class="fas fa-eye"></i></span></div></div>
                    <a href="login.html" class="eka-btn eka-btn-primary eka-btn-block">Reset Password</a>
                </form>
                <div class="eka-auth-footer" style="margin-top:20px">Remember your password? <a href="login.html">Sign In</a></div>
            </div>
        </div>
    </div>
    <script>document.querySelectorAll('.eka-password-toggle-btn').forEach(function(b){b.addEventListener('click',function(){var i=b.parentElement.querySelector('input'),c=b.querySelector('i');if(i.type==='password'){i.type='text';c.className='fas fa-eye-slash';}else{i.type='password';c.className='fas fa-eye';}});});</script>
</body>
</html>
