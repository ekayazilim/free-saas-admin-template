<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Create Post - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Create New Post</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><a href="list.html">Blog</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Create</span></div></div></div>
<div class="eka-row"><div class="eka-col-8"><div class="eka-card"><div class="eka-card-header"><h6>Post Content</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Post Title</label><input class="eka-form-control" placeholder="Enter post title..." style="font-size:1rem;font-weight:600"></div>
<div class="eka-form-group"><label class="eka-form-label">Slug</label><input class="eka-form-control" placeholder="post-url-slug" value="building-scalable-saas-applications"></div>
<div class="eka-form-group"><label class="eka-form-label">Content</label><div style="border:1px solid var(--eka-border-color);border-radius:8px;overflow:hidden"><div style="padding:8px 12px;background:var(--eka-gray-50);border-bottom:1px solid var(--eka-border-color);display:flex;gap:4px;flex-wrap:wrap"><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-bold"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-italic"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-underline"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-strikethrough"></i></button><span style="width:1px;background:var(--eka-border-color);margin:0 4px"></span><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-heading"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-list-ul"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-list-ol"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-quote-right"></i></button><span style="width:1px;background:var(--eka-border-color);margin:0 4px"></span><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-link"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-image"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-code"></i></button></div><textarea style="width:100%;min-height:300px;border:none;padding:16px;font-size:.875rem;resize:vertical;outline:none;font-family:inherit" placeholder="Start writing your blog post content..."></textarea></div></div>
<div class="eka-form-group"><label class="eka-form-label">Excerpt</label><textarea class="eka-form-control" rows="3" placeholder="Short description for SEO and previews..."></textarea></div>
</div></div></div>
<div class="eka-col-4"><div class="eka-card"><div class="eka-card-header"><h6>Publish</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Status</label><select class="eka-form-control"><option>Draft</option><option>Published</option><option>Scheduled</option></select></div>
<div class="eka-form-group"><label class="eka-form-label">Publish Date</label><input class="eka-form-control" type="date" value="2026-04-22"></div>
<div class="eka-form-group"><label class="eka-form-label">Visibility</label><select class="eka-form-control"><option>Public</option><option>Private</option><option>Password Protected</option></select></div>
<div class="d-flex gap-2"><button class="eka-btn eka-btn-light flex-fill">Save Draft</button><button class="eka-btn eka-btn-primary flex-fill">Publish</button></div>
</div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Category</h6></div><div class="eka-card-body"><select class="eka-form-control"><option>Select category...</option><option>Technology</option><option>Design</option><option>Security</option><option>Business</option><option>Marketing</option></select></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Tags</h6></div><div class="eka-card-body"><input class="eka-form-control" placeholder="Add tags separated by comma..."><div class="d-flex flex-wrap gap-2 mt-3"><span class="eka-badge eka-badge-soft-primary">SaaS <i class="fas fa-times ms-1" style="cursor:pointer;font-size:.6rem"></i></span><span class="eka-badge eka-badge-soft-primary">Architecture <i class="fas fa-times ms-1" style="cursor:pointer;font-size:.6rem"></i></span></div></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Featured Image</h6></div><div class="eka-card-body"><div style="border:2px dashed var(--eka-border-color);border-radius:8px;padding:24px;text-align:center;cursor:pointer"><i class="fas fa-image" style="font-size:2rem;color:var(--eka-gray-400);margin-bottom:8px;display:block"></i><span class="fs-12 text-muted">Click to upload image</span></div></div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="blog/create.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
