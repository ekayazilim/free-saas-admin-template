<div class="eka-col-9">
<div class="eka-card mb-4"><div class="eka-card-header"><h6><i class="fas fa-building me-2 text-primary"></i>Company Information</h6></div><div class="eka-card-body">
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Company Name</label><input class="eka-form-control" value="EkaAdmin Inc"></div><div class="eka-form-group"><label class="eka-form-label">Website</label><input class="eka-form-control" value="https://ekadmin.com"></div></div>
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Industry</label><select class="eka-form-control"><option selected>Technology</option><option>Finance</option><option>Healthcare</option></select></div><div class="eka-form-group"><label class="eka-form-label">Company Size</label><select class="eka-form-control"><option selected>51-200 employees</option><option>11-50</option><option>201-500</option></select></div></div>
</div></div>
<div class="eka-card mb-4"><div class="eka-card-header"><h6><i class="fas fa-globe me-2 text-info"></i>Localization</h6></div><div class="eka-card-body">
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Language</label><select class="eka-form-control"><option selected>English</option><option>Turkish</option><option>German</option></select></div><div class="eka-form-group"><label class="eka-form-label">Timezone</label><select class="eka-form-control"><option selected>UTC-8 (Pacific Time)</option><option>UTC+3 (Turkey)</option></select></div></div>
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Date Format</label><select class="eka-form-control"><option selected>MM/DD/YYYY</option><option>DD/MM/YYYY</option></select></div><div class="eka-form-group"><label class="eka-form-label">Currency</label><select class="eka-form-control"><option selected>USD ($)</option><option>EUR</option><option>TRY</option></select></div></div>
</div></div>
<div class="eka-card"><div class="eka-card-header"><h6><i class="fas fa-shield-alt me-2 text-success"></i>Security</h6></div><div class="eka-card-body">
<div class="d-flex justify-between align-center py-3 border-bottom"><div><div class="fw-semibold fs-13">Two-Factor Authentication</div><div class="fs-12 text-muted">Add an extra layer of security</div></div><label class="eka-switch"><input type="checkbox" checked><span class="eka-switch-slider"></span></label></div>
<div class="d-flex justify-between align-center py-3 border-bottom"><div><div class="fw-semibold fs-13">Login Notifications</div><div class="fs-12 text-muted">Get notified on new login</div></div><label class="eka-switch"><input type="checkbox" checked><span class="eka-switch-slider"></span></label></div>

</div></div>
<div class="d-flex gap-2 mt-4"><button class="eka-btn eka-btn-primary"><i class="fas fa-save me-2"></i>Save Changes</button><button class="eka-btn eka-btn-light">Cancel</button></div>
