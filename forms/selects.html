<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Select & Checkboxes - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Select & Checkboxes</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Selects</span></div></div></div><div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Select Elements</h6></div><div class="eka-card-body"><div class="eka-form-group"><label class="eka-form-label">Default Select</label><select class="eka-form-control"><option>Choose an option...</option><option>Option 1</option><option>Option 2</option><option>Option 3</option></select></div><div class="eka-form-group"><label class="eka-form-label">Multi Select</label><select class="eka-form-control" multiple style="height:120px"><option>JavaScript</option><option selected>TypeScript</option><option selected>Python</option><option>PHP</option><option>Go</option></select></div><div class="eka-form-group"><label class="eka-form-label">Grouped Select</label><select class="eka-form-control"><optgroup label="Frontend"><option>React</option><option>Vue.js</option><option>Angular</option></optgroup><optgroup label="Backend"><option>Node.js</option><option>Laravel</option><option>Django</option></optgroup></select></div></div></div></div><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Checkboxes & Radios</h6></div><div class="eka-card-body"><div class="mb-4"><h6 class="fs-13 mb-3">Checkboxes</h6><div class="d-flex flex-column gap-2"><label class="d-flex align-center gap-2 fs-13 cursor-pointer"><input type="checkbox" checked style="width:16px;height:16px;accent-color:var(--eka-primary)"> Default checkbox</label><label class="d-flex align-center gap-2 fs-13 cursor-pointer"><input type="checkbox" style="width:16px;height:16px;accent-color:var(--eka-primary)"> Unchecked</label><label class="d-flex align-center gap-2 fs-13 cursor-pointer" style="opacity:.5"><input type="checkbox" disabled style="width:16px;height:16px"> Disabled</label></div></div><div class="mb-4"><h6 class="fs-13 mb-3">Radio Buttons</h6><div class="d-flex flex-column gap-2"><label class="d-flex align-center gap-2 fs-13 cursor-pointer"><input type="radio" name="radioDemo" checked style="width:16px;height:16px;accent-color:var(--eka-primary)"> Option One</label><label class="d-flex align-center gap-2 fs-13 cursor-pointer"><input type="radio" name="radioDemo" style="width:16px;height:16px;accent-color:var(--eka-primary)"> Option Two</label><label class="d-flex align-center gap-2 fs-13 cursor-pointer"><input type="radio" name="radioDemo" style="width:16px;height:16px;accent-color:var(--eka-primary)"> Option Three</label></div></div><div><h6 class="fs-13 mb-3">Toggle Switches</h6><div class="d-flex flex-column gap-3"><label class="d-flex align-center gap-2 fs-13"><div style="position:relative;width:44px;height:24px"><input type="checkbox" checked style="opacity:0;position:absolute;width:100%;height:100%;cursor:pointer;z-index:2" onchange="this.nextElementSibling.style.background=this.checked?'var(--eka-primary)':'var(--eka-gray-300)';this.nextElementSibling.querySelector('div').style.transform=this.checked?'translateX(20px)':'translateX(0)'"><div style="position:absolute;inset:0;background:var(--eka-primary);border-radius:12px;transition:all .3s"><div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:all .3s;transform:translateX(20px)"></div></div></div> Dark Mode</label><label class="d-flex align-center gap-2 fs-13"><div style="position:relative;width:44px;height:24px"><input type="checkbox" style="opacity:0;position:absolute;width:100%;height:100%;cursor:pointer;z-index:2" onchange="this.nextElementSibling.style.background=this.checked?'var(--eka-success)':'var(--eka-gray-300)';this.nextElementSibling.querySelector('div').style.transform=this.checked?'translateX(20px)':'translateX(0)'"><div style="position:absolute;inset:0;background:var(--eka-gray-300);border-radius:12px;transition:all .3s"><div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:all .3s"></div></div></div> Notifications</label></div></div></div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="forms/selects.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
