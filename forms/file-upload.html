<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>File Upload - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>File Upload</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Upload</span></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Drag & Drop Upload</h6></div><div class="eka-card-body">
<div style="border:2px dashed var(--eka-border-color);border-radius:12px;padding:48px;text-align:center;background:var(--eka-gray-50);transition:all .3s" onmouseover="this.style.borderColor='var(--eka-primary)';this.style.background='rgba(64,81,137,.03)'" onmouseout="this.style.borderColor='var(--eka-border-color)';this.style.background='var(--eka-gray-50)'">
<i class="fas fa-cloud-upload-alt" style="font-size:3rem;color:var(--eka-primary);opacity:.5;margin-bottom:16px;display:block"></i>
<h6 class="mb-2">Drop files here or click to upload</h6>
<p class="fs-12 text-muted mb-3">Support: JPG, PNG, PDF, DOC (Max 10MB)</p>
<input type="file" id="fileInput" style="display:none" multiple>
<button class="eka-btn eka-btn-soft-primary eka-btn-sm" onclick="document.getElementById('fileInput').click()"><i class="fas fa-folder-open me-1"></i>Browse Files</button>
</div></div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Uploaded Files</h6></div><div class="eka-card-body">
<div class="d-flex align-center gap-3 py-3 border-bottom"><div style="width:40px;height:40px;border-radius:8px;background:rgba(53,119,241,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-file-image text-primary"></i></div><div class="flex-fill"><div class="fw-semibold fs-13">dashboard-screenshot.png</div><div class="fs-11 text-muted">2.4 MB</div></div><div class="eka-progress" style="width:60px;height:4px"><div class="eka-progress-bar" style="width:100%;background:var(--eka-success)"></div></div><span class="fs-11 text-success fw-semibold">Done</span></div>
<div class="d-flex align-center gap-3 py-3 border-bottom"><div style="width:40px;height:40px;border-radius:8px;background:rgba(240,101,72,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-file-pdf text-danger"></i></div><div class="flex-fill"><div class="fw-semibold fs-13">annual-report-2026.pdf</div><div class="fs-11 text-muted">5.8 MB</div></div><div class="eka-progress" style="width:60px;height:4px"><div class="eka-progress-bar" style="width:72%;background:var(--eka-primary)"></div></div><span class="fs-11 text-primary fw-semibold">72%</span></div>
<div class="d-flex align-center gap-3 py-3"><div style="width:40px;height:40px;border-radius:8px;background:rgba(10,179,156,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="fas fa-file-excel text-success"></i></div><div class="flex-fill"><div class="fw-semibold fs-13">sales-data.xlsx</div><div class="fs-11 text-muted">420 KB</div></div><div class="eka-progress" style="width:60px;height:4px"><div class="eka-progress-bar" style="width:35%;background:var(--eka-warning)"></div></div><span class="fs-11 text-warning fw-semibold">35%</span></div>
</div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="forms/file-upload.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
