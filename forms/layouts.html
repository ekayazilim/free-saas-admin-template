<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Form Layouts - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Form Layouts</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Layouts</span></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Vertical Form</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Name</label><input class="eka-form-control" placeholder="Enter name"></div>
<div class="eka-form-group"><label class="eka-form-label">Email</label><input class="eka-form-control" type="email" placeholder="Enter email"></div>
<div class="eka-form-group"><label class="eka-form-label">Message</label><textarea class="eka-form-control" rows="3" placeholder="Your message"></textarea></div>
<button class="eka-btn eka-btn-primary">Submit</button>
</div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Inline Form</h6></div><div class="eka-card-body">
<div class="d-flex gap-2 mb-4"><input class="eka-form-control" placeholder="Name" style="flex:1"><input class="eka-form-control" placeholder="Email" style="flex:1"><button class="eka-btn eka-btn-primary">Subscribe</button></div>
<div class="eka-card" style="background:var(--eka-gray-50);border:1px dashed var(--eka-border-color)"><div class="eka-card-body"><h6 class="mb-2">Two Column Layout</h6><div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">First Name</label><input class="eka-form-control"></div><div class="eka-form-group"><label class="eka-form-label">Last Name</label><input class="eka-form-control"></div></div><div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">City</label><input class="eka-form-control"></div><div class="eka-form-group"><label class="eka-form-label">ZIP</label><input class="eka-form-control"></div></div></div></div>
</div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="forms/layouts.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
