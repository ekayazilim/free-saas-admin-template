<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Basic Forms - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Basic Forms</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Basic Forms</span></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Text Inputs</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Default Input</label><input class="eka-form-control" placeholder="Enter text..."></div>
<div class="eka-form-group"><label class="eka-form-label">With Icon</label><div style="position:relative"><i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--eka-gray-400)"></i><input class="eka-form-control" style="padding-left:36px" placeholder="Search..."></div></div>
<div class="eka-form-group"><label class="eka-form-label">Disabled</label><input class="eka-form-control" disabled value="Disabled input"></div>
<div class="eka-form-group"><label class="eka-form-label">Textarea</label><textarea class="eka-form-control" rows="3" placeholder="Write something..."></textarea></div>
</div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Select & Checkboxes</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Select</label><select class="eka-form-control"><option>Choose option...</option><option>Option 1</option><option>Option 2</option><option>Option 3</option></select></div>
<div class="eka-form-group"><label class="eka-form-label">Checkboxes</label><div class="d-flex flex-column gap-2"><label class="d-flex align-center gap-2 fs-13"><input type="checkbox" checked> Option A</label><label class="d-flex align-center gap-2 fs-13"><input type="checkbox"> Option B</label><label class="d-flex align-center gap-2 fs-13"><input type="checkbox"> Option C</label></div></div>
<div class="eka-form-group"><label class="eka-form-label">Radio</label><div class="d-flex flex-column gap-2"><label class="d-flex align-center gap-2 fs-13"><input type="radio" name="r1" checked> Radio 1</label><label class="d-flex align-center gap-2 fs-13"><input type="radio" name="r1"> Radio 2</label></div></div>
<div class="eka-form-group"><label class="eka-form-label">Toggle Switch</label><div class="d-flex gap-4"><label class="eka-switch"><input type="checkbox" checked><span class="eka-switch-slider"></span></label><label class="eka-switch"><input type="checkbox"><span class="eka-switch-slider"></span></label></div></div>
</div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="forms/basic.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
