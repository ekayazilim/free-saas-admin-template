<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Form Validation - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Form Validation</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Validation</span></div></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Registration Form with Validation</h6></div><div class="eka-card-body">
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">First Name *</label><input class="eka-form-control eka-is-valid" value="Richard"><div class="eka-valid-feedback"><i class="fas fa-check-circle me-1"></i>Looks good!</div></div><div class="eka-form-group"><label class="eka-form-label">Last Name *</label><input class="eka-form-control eka-is-valid" value="Davis"><div class="eka-valid-feedback"><i class="fas fa-check-circle me-1"></i>Looks good!</div></div></div>
<div class="eka-form-group"><label class="eka-form-label">Email *</label><input class="eka-form-control eka-is-invalid" value="invalid-email"><div class="eka-invalid-feedback"><i class="fas fa-exclamation-circle me-1"></i>Please enter a valid email address.</div></div>
<div class="eka-form-group"><label class="eka-form-label">Password *</label><input class="eka-form-control eka-is-invalid" type="password" value="123"><div class="eka-invalid-feedback"><i class="fas fa-exclamation-circle me-1"></i>Password must be at least 8 characters.</div></div>
<div class="eka-form-group"><label class="eka-form-label">Confirm Password *</label><input class="eka-form-control" type="password" placeholder="Confirm password"></div>
<button class="eka-btn eka-btn-primary">Submit Form</button>
</div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="forms/validation.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
