<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Loaders & Spinners - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Loaders & Spinners</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Loaders</span></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>CSS Spinners</h6></div><div class="eka-card-body"><div class="d-flex flex-wrap gap-4 align-center">
<div style="width:40px;height:40px;border:3px solid var(--eka-border-color);border-top-color:var(--eka-primary);border-radius:50%;animation:spin 1s linear infinite"></div>
<div style="width:40px;height:40px;border:3px solid var(--eka-border-color);border-top-color:var(--eka-success);border-radius:50%;animation:spin .8s linear infinite"></div>
<div style="width:40px;height:40px;border:3px solid var(--eka-border-color);border-top-color:var(--eka-danger);border-radius:50%;animation:spin .6s linear infinite"></div>
<div style="width:48px;height:48px;border:4px solid var(--eka-border-color);border-top-color:var(--eka-primary);border-right-color:var(--eka-primary);border-radius:50%;animation:spin 1s linear infinite"></div>
</div></div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Growing Spinners</h6></div><div class="eka-card-body"><div class="d-flex flex-wrap gap-4 align-center">
<div style="width:40px;height:40px;border-radius:50%;background:var(--eka-primary);animation:pulse 1.5s ease-in-out infinite"></div>
<div style="width:40px;height:40px;border-radius:50%;background:var(--eka-success);animation:pulse 1.5s ease-in-out infinite;animation-delay:.2s"></div>
<div style="width:40px;height:40px;border-radius:50%;background:var(--eka-warning);animation:pulse 1.5s ease-in-out infinite;animation-delay:.4s"></div>
<div style="width:40px;height:40px;border-radius:50%;background:var(--eka-danger);animation:pulse 1.5s ease-in-out infinite;animation-delay:.6s"></div>
</div></div></div></div></div>
<div class="eka-row"><div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Dot Loaders</h6></div><div class="eka-card-body"><div class="d-flex gap-5">
<div class="d-flex gap-1 align-center"><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-primary);animation:bounce 1.4s infinite ease-in-out both;animation-delay:-.32s"></div><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-primary);animation:bounce 1.4s infinite ease-in-out both;animation-delay:-.16s"></div><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-primary);animation:bounce 1.4s infinite ease-in-out both"></div></div>
<div class="d-flex gap-1 align-center"><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-success);animation:bounce 1.4s infinite ease-in-out both;animation-delay:-.32s"></div><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-success);animation:bounce 1.4s infinite ease-in-out both;animation-delay:-.16s"></div><div style="width:12px;height:12px;border-radius:50%;background:var(--eka-success);animation:bounce 1.4s infinite ease-in-out both"></div></div>
</div></div></div></div>
<div class="eka-col-6"><div class="eka-card"><div class="eka-card-header"><h6>Button Loaders</h6></div><div class="eka-card-body"><div class="d-flex flex-wrap gap-3"><button class="eka-btn eka-btn-primary" disabled><span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle"></span>Loading...</button><button class="eka-btn eka-btn-success" disabled><span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle"></span>Processing...</button><button class="eka-btn eka-btn-soft-primary" disabled><span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(64,81,137,.2);border-top-color:var(--eka-primary);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle"></span>Saving...</button></div></div></div></div></div>
<style>@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}</style></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="components/loaders.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
