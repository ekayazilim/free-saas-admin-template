<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Data Tables - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Data Tables</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Data Tables</span></div></div></div><div class="eka-card"><div class="eka-card-header"><h6>Sortable & Filterable Table</h6><div class="d-flex gap-2"><input class="eka-form-control" placeholder="Search..." style="width:200px;height:34px;font-size:.8125rem" id="dtSearch" oninput="filterTable()"><button class="eka-btn eka-btn-soft-primary eka-btn-sm"><i class="fas fa-download me-1"></i>Export</button></div></div><div class="eka-table-responsive"><table class="eka-table eka-table-hover" id="dataTable"><thead><tr><th style="cursor:pointer" onclick="sortTable(0)">ID "hannah@mail.com","Editor","Active","2026-03-12"],["9","Ivan Petrov","ivan@mail.com","User","Active","2026-03-20"],["10","Julia Wang","julia@mail.com","Admin","Active","2026-04-01"]];function renderTable(d){var b=document.getElementById("dtBody");b.innerHTML="";d.forEach(function(r){var sc=r[4]==="Active"?"success":"secondary";b.innerHTML+="<tr><td class=\"fw-semibold\">#"+r[0]+"</td><td><div class=\"d-flex align-center gap-2\"><img src=\"https://api.dicebear.com/7.x/avataaars/svg?seed=dt"+r[0]+"\" style=\"width:28px;height:28px;border-radius:50%\"><span class=\"fs-13\">"+r[1]+"</span></div></td><td class=\"fs-12 text-muted\">"+r[2]+"</td><td><span class=\"eka-badge eka-badge-soft-primary\">"+r[3]+"</span></td><td><span class=\"eka-badge eka-badge-soft-"+sc+"\">"+r[4]+"</span></td><td class=\"fs-12 text-muted\">"+r[5]+"</td></tr>"})}renderTable(dtData);var sortDir={};function sortTable(c){sortDir[c]=!sortDir[c];dtData.sort(function(a,b){return sortDir[c]?a[c].localeCompare(b[c]):b[c].localeCompare(a[c])});renderTable(dtData)}function filterTable(){var v=document.getElementById("dtSearch").value.toLowerCase();var fd=dtData.filter(function(r){return r.join(" ").toLowerCase().includes(v)});renderTable(fd)}</script></body></html>
