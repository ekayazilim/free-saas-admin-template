<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Checkout - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Checkout</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><a href="cart.html">Cart</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Checkout</span></div></div></div>
<div class="eka-row"><div class="eka-col-8">
<div class="eka-card mb-4"><div class="eka-card-header"><h6><i class="fas fa-user me-2 text-primary"></i>Billing Information</h6></div><div class="eka-card-body">
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">First Name</label><input class="eka-form-control" value="Richard"></div><div class="eka-form-group"><label class="eka-form-label">Last Name</label><input class="eka-form-control" value="Davis"></div></div>
<div class="eka-form-group"><label class="eka-form-label">Email</label><input class="eka-form-control" type="email" value="admin@ekadmin.com"></div>
<div class="eka-form-group"><label class="eka-form-label">Address</label><input class="eka-form-control" value="123 Business Ave"></div>
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">City</label><input class="eka-form-control" value="San Francisco"></div><div class="eka-form-group"><label class="eka-form-label">State</label><input class="eka-form-control" value="California"></div><div class="eka-form-group"><label class="eka-form-label">ZIP</label><input class="eka-form-control" value="94105"></div></div>
</div></div>
<div class="eka-card"><div class="eka-card-header"><h6><i class="fas fa-credit-card me-2 text-success"></i>Payment Method</h6></div><div class="eka-card-body">
<div class="d-flex gap-3 mb-4"><label style="flex:1;padding:16px;border:2px solid var(--eka-primary);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px"><input type="radio" name="payment" checked><i class="fab fa-cc-visa" style="font-size:1.5rem;color:var(--eka-primary)"></i><span class="fw-medium fs-13">Credit Card</span></label><label style="flex:1;padding:16px;border:2px solid var(--eka-border-color);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:10px"><input type="radio" name="payment"><i class="fab fa-paypal" style="font-size:1.5rem;color:#003087"></i><span class="fw-medium fs-13">PayPal</span></label></div>
<div class="eka-form-group"><label class="eka-form-label">Card Number</label><input class="eka-form-control" placeholder="1234 5678 9012 3456"></div>
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Expiry Date</label><input class="eka-form-control" placeholder="MM/YY"></div><div class="eka-form-group"><label class="eka-form-label">CVV</label><input class="eka-form-control" placeholder="123"></div></div>
</div></div></div>
<div class="eka-col-4"><div class="eka-card" style="position:sticky;top:100px"><div class="eka-card-header"><h6>Order Summary</h6></div><div class="eka-card-body">
<div class="d-flex justify-between py-2 fs-13 border-bottom"><span class="text-muted">Subtotal (3 items)</span><span class="fw-medium">$2,696.00</span></div>
<div class="d-flex justify-between py-2 fs-13 border-bottom"><span class="text-muted">Discount</span><span class="fw-medium text-success">-$269.60</span></div>
<div class="d-flex justify-between py-2 fs-13 border-bottom"><span class="text-muted">Tax</span><span class="fw-medium">$194.11</span></div>
<div class="d-flex justify-between py-3 fs-16 fw-bold"><span>Total</span><span class="text-primary">$2,620.51</span></div>
<button class="eka-btn eka-btn-primary eka-btn-block" style="padding:14px"><i class="fas fa-lock me-2"></i>Complete Order</button>
<p class="text-center fs-11 text-muted mt-3"><i class="fas fa-shield-alt me-1"></i>Your payment is secure and encrypted</p>
</div></div></div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="ecommerce/checkout.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
