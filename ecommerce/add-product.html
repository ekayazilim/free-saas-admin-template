<!DOCTYPE html><html lang="en" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Add Product - EkaAdmin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"><link rel="stylesheet" href="../assets/css/eka-variables.css"><link rel="stylesheet" href="../assets/css/eka-base.css"><link rel="stylesheet" href="../assets/css/eka-layout.css"><link rel="stylesheet" href="../assets/css/eka-components.css"><link rel="stylesheet" href="../assets/css/eka-widgets.css"><link rel="stylesheet" href="../assets/css/eka-forms.css"><link rel="stylesheet" href="../assets/css/eka-tables.css"><link rel="stylesheet" href="../assets/css/eka-pages.css"><link rel="stylesheet" href="../assets/css/eka-animations.css"><link rel="stylesheet" href="../assets/css/eka-dark.css"><link rel="stylesheet" href="../assets/css/eka-responsive.css"></head><body><div class="eka-app" id="ekaApp"><div class="eka-sidebar" id="ekaSidebar"></div><div class="eka-overlay" id="ekaOverlay"></div><div class="eka-main"><header class="eka-topbar" id="ekaTopbar"></header><div class="eka-content"><div class="eka-page-header"><div><h4>Add Product</h4><div class="eka-breadcrumb"><a href="../dashboards/index.html">Dashboard</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><a href="products.html">Products</a><span class="eka-breadcrumb-separator"><i class="fas fa-chevron-right"></i></span><span class="eka-breadcrumb-active">Add</span></div></div></div>
<div class="eka-row"><div class="eka-col-8">
<div class="eka-card mb-4"><div class="eka-card-header"><h6>General Information</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Product Name *</label><input class="eka-form-control" placeholder="Enter product name"></div>
<div class="eka-form-group"><label class="eka-form-label">Description *</label><div style="border:1px solid var(--eka-border-color);border-radius:8px;overflow:hidden"><div style="padding:8px 12px;background:var(--eka-gray-50);border-bottom:1px solid var(--eka-border-color);display:flex;gap:4px"><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-bold"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-italic"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-list-ul"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-link"></i></button><button class="eka-btn eka-btn-light eka-btn-sm" style="padding:4px 8px"><i class="fas fa-image"></i></button></div><textarea style="width:100%;min-height:180px;border:none;padding:16px;font-size:.875rem;resize:vertical;outline:none" placeholder="Product description..."></textarea></div></div>
</div></div>
<div class="eka-card mb-4"><div class="eka-card-header"><h6>Product Images</h6></div><div class="eka-card-body"><div style="border:2px dashed var(--eka-border-color);border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:all .3s" onmouseover="this.style.borderColor='var(--eka-primary)'" onmouseout="this.style.borderColor='var(--eka-border-color)'"><i class="fas fa-cloud-upload-alt" style="font-size:2.5rem;color:var(--eka-primary);opacity:.5;margin-bottom:12px;display:block"></i><h6 class="mb-1">Drag images here or click to upload</h6><p class="fs-12 text-muted mb-0">PNG, JPG, WEBP (Max 5MB each, up to 8 images)</p></div>
<div class="d-flex gap-3 mt-3">
<div style="width:80px;height:80px;border-radius:8px;background:linear-gradient(135deg,#405189,#3577f1);display:flex;align-items:center;justify-content:center;position:relative"><i class="fas fa-image" style="color:rgba(255,255,255,.3);font-size:1.5rem"></i><button style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--eka-danger);color:#fff;border:2px solid var(--eka-card-bg);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-times"></i></button></div>
<div style="width:80px;height:80px;border-radius:8px;background:linear-gradient(135deg,#0ab39c,#10c7a8);display:flex;align-items:center;justify-content:center;position:relative"><i class="fas fa-image" style="color:rgba(255,255,255,.3);font-size:1.5rem"></i><button style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--eka-danger);color:#fff;border:2px solid var(--eka-card-bg);font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fas fa-times"></i></button></div>
</div></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Pricing & Stock</h6></div><div class="eka-card-body">
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Regular Price ($) *</label><input class="eka-form-control" type="number" placeholder="0.00"></div><div class="eka-form-group"><label class="eka-form-label">Sale Price ($)</label><input class="eka-form-control" type="number" placeholder="0.00"></div></div>
<div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">SKU</label><input class="eka-form-control" placeholder="EKA-PROD-001"></div><div class="eka-form-group"><label class="eka-form-label">Stock Quantity *</label><input class="eka-form-control" type="number" placeholder="0"></div></div>
</div></div></div>
<div class="eka-col-4">
<div class="eka-card mb-4"><div class="eka-card-header"><h6>Publish</h6></div><div class="eka-card-body">
<div class="eka-form-group"><label class="eka-form-label">Status</label><select class="eka-form-control"><option>Draft</option><option>Published</option><option>Scheduled</option></select></div>
<div class="eka-form-group"><label class="eka-form-label">Visibility</label><select class="eka-form-control"><option>Public</option><option>Hidden</option></select></div>
<div class="d-flex gap-2"><button class="eka-btn eka-btn-light flex-fill">Save Draft</button><button class="eka-btn eka-btn-primary flex-fill"><i class="fas fa-check me-1"></i>Publish</button></div>
</div></div>
<div class="eka-card mb-4"><div class="eka-card-header"><h6>Category</h6></div><div class="eka-card-body"><select class="eka-form-control mb-3"><option>Select category...</option><option>Electronics</option><option>Software</option><option>Services</option><option>Marketing</option></select><div class="d-flex flex-column gap-2"><label class="d-flex align-center gap-2 fs-13"><input type="checkbox"> Electronics</label><label class="d-flex align-center gap-2 fs-13"><input type="checkbox" checked> Software</label><label class="d-flex align-center gap-2 fs-13"><input type="checkbox"> Services</label></div></div></div>
<div class="eka-card mb-4"><div class="eka-card-header"><h6>Tags</h6></div><div class="eka-card-body"><input class="eka-form-control" placeholder="Add tags..."><div class="d-flex flex-wrap gap-2 mt-2"><span class="eka-badge eka-badge-soft-primary">Premium <i class="fas fa-times ms-1" style="cursor:pointer;font-size:.6rem"></i></span><span class="eka-badge eka-badge-soft-primary">SaaS <i class="fas fa-times ms-1" style="cursor:pointer;font-size:.6rem"></i></span></div></div></div>
<div class="eka-card"><div class="eka-card-header"><h6>Shipping</h6></div><div class="eka-card-body"><div class="eka-form-group"><label class="eka-form-label">Weight (kg)</label><input class="eka-form-control" type="number" placeholder="0.0"></div><div class="eka-form-row"><div class="eka-form-group"><label class="eka-form-label">Length</label><input class="eka-form-control" type="number" placeholder="cm"></div><div class="eka-form-group"><label class="eka-form-label">Width</label><input class="eka-form-control" type="number" placeholder="cm"></div></div></div></div>
</div></div></div><footer class="eka-footer" id="ekaFooter"></footer></div></div><div class="eka-theme-panel" id="ekaThemePanel"></div><button class="eka-theme-panel-trigger" id="ekaThemePanelTrigger"><i class="fas fa-cog"></i></button><script>var EKA_BASE="../";var EKA_ACTIVE="ecommerce/add-product.html";</script><script src="../assets/js/eka-app.js"></script></body></html>
